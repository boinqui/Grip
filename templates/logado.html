<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grip - Usuário logado</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
</head>
<body class="min-h-screen flex items-center justify-center bg-zinc-100 px-4">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-8 text-center">
        <h1 class="text-3xl font-bold tracking-tight text-zinc-900">Você já está logado</h1>
        {% if nome_usuario %}
        <p class="mt-3 text-zinc-800">Olá, {{ nome_usuario }}.</p>
        {% endif %}

        <form action="/logout" method="get" class="mt-6">
            <button type="submit" class="w-full bg-indigo-500 hover:bg-indigo-400 text-white font-medium py-2 rounded-lg">
                Deslogar
            </button>
        </form>
    </div>
</body>
</html>
